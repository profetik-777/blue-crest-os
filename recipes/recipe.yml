---
# yaml-language-server: $schema=https://schema.blue-build.org/recipe-v1.json

name: blue-crest-os
description: Blue Crest OS - LXQt-based Universal Blue image

base-image: ghcr.io/ublue-os/base-main
image-version: latest

modules:
  - type: dnf
    install:
      packages:
        # LXQt core
        - lxqt-session
        - lxqt-panel
        - lxqt-config
        - lxqt-runner
        - lxqt-globalkeys
        - lxqt-notificationd
        - lxqt-powermanagement
        - lxqt-policykit
        - lxqt-qtplugin
        - lxqt-themes
        - lxqt-themes-fedora
        - lxqt-archiver
        - lxqt-about

        # LXQt Wayland session support
        - lxqt-wayland-session
        - qt6-qtwayland
        - xorg-x11-server-Xwayland

        # KWin Wayland compositor support
        - kwin
        - plasma-workspace-wayland
        - kscreen
        - layer-shell-qt

        # LXQt apps + core tools
        - pcmanfm-qt
        - qterminal

        # System essentials
        - sddm
        - sddm-themes
        - network-manager-applet
        - nm-connection-editor
        - firewall-config
        - xdg-user-dirs
        - upower
        - xdg-desktop-portal-kde

        # Containers + dev workflow
        - podman
        - distrobox

        # Tailscale
        - tailscale

        # Wallpapers
        - fedora-workstation-backgrounds
        - f40-backgrounds
        - f41-backgrounds
        - f42-backgrounds

        # Theme polish
        - papirus-icon-theme
        - adwaita-icon-theme
        - breeze-icon-theme
        - breeze-cursor-theme
        - breeze-gtk
        - kvantum
        - kvantum-qt5
        - kvantum-qt6

    remove:
      packages:
        # GNOME / GTK apps removed for a cleaner LXQt image
        - gnome-connections
        - gnome-calendar
        - simple-scan
        - evince
        - pinta
        - gnome-calculator
        - gnome-contacts
        - snapshot
        - gnome-maps
        - gnome-sound-recorder
        - smile
        - gnome-weather
        - rofi

        # Remove LXQt Wayfire session pieces
        - lxqt-wayfire-session
        - wayfire-config-manager
        - wayland-logout
        - wf-shell
        - nwg-panel.noarch

        # Remove X11 session pieces now that Fedora 44 is Wayland-first
        - xorg-x11-server-Xorg
        - xorg-x11-xauth
        - xorg-x11-xinit
        - xorg-x11-utils
        - xorg-x11-drv-libinput
        - openbox
        - obconf

  - type: systemd
    system:
      enabled:
        - sddm.service
        - tailscaled.service

  - type: default-flatpaks
    configurations:
      - notify: true
        scope: system
        install:
          - org.mozilla.firefox
          - io.github.kolunmi.Bazaar
          - com.ranfdev.DistroShelf
          - com.github.tchx84.Flatseal
          - io.gitlab.adhami3310.Impression
          - org.remmina.Remmina
      - scope: user

  - type: brew
    nofile-limits: true

  - type: signing
